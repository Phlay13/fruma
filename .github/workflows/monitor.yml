name: fruma-monitor
on:
  schedule:
    - cron: "11,41 * * * *" # backup only — the chain below is the real driver
  workflow_dispatch: {}

concurrency:
  group: fruma-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Run scan window (25 min)
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          MAX_RUNTIME_MS: "1500000"
          POLL_INTERVAL_MS: "5000"
        run: npx ts-node src/engine.ts
      - name: Commit state back
        if: always()
        run: |
          git config user.name "fruma-bot"
          git config user.email "fruma-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -f data/state.json data/shadow-log.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state: scan $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push || (git pull --rebase --autostash && git push)
      - name: Chain next run
        if: always()
        run: |
          # Self-perpetuating: dispatch the next run directly (GitHub cron is unreliable
          # on fresh repos). Only chain from dispatch runs — schedule runs are one-shot
          # backups, so a late-firing cron can't fork the chain into parallel chains.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches" \
              -d '{"ref":"main"}' -w "dispatch HTTP %{http_code}\n"
          fi
